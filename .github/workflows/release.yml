name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build DMG
        run: npm run build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: boveda-dmg
          path: dist-new/*.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-new/*.dmg
          generate_release_notes: true
